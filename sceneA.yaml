# 场景A：测控指令解码与执行逻辑测试

scene_name: "场景A-测控指令解码"
scene_id: "sceneA"

# 方案1：纯提示词无结构
scheme1:
  name: "方案1-纯提示词"
  system: ""
  user: |
    你是一个航天FPGA测试工程师，请根据以下信息生成测试项。

    测试需求：验证FPGA上电复位1s后从FLASH读取板卡ID、射频发射/接收本振配置参数的功能。

    地址分配：0x0000~0x000F为测控指令寄存器，奇地址为写使能，偶地址为指令存储。

    时序要求：指令输入信号相对于时钟信号CLK（100MHz）的建立时间≥12ns，保持时间≥8ns，指令解码延迟≤3个CLK周期。

    边界条件：地址边界（0x0000和0x000F）、时序边界（建立时间12ns、保持时间8ns）、指令边界（最大指令数16条）。

    参数表：
    - 板卡ID寄存器地址：0x0000
    - 射频发射本振配置地址：0x0002
    - 射频接收本振配置地址：0x0004
    - 状态寄存器地址：0x000E

    输出格式要求：请以JSON格式输出，包含test_items数组且每个item包含name/methods/requirements/criteria四个字段。
# 方案2：结构化上下文
scheme2:
  name: "方案2-结构化上下文"
  system: ""
  user: |
    【角色要求】
    你是一名资深航天FPGA测试工程师，具备10年以上航天嵌入式软件测试经验，熟悉GJB9433可编程逻辑测试要求。

    【输出规则】
    1. 输出格式：标准JSON格式
    2. 必填字段：测试项名称、测试方法、测试充分性要求、通过准则
    3. 条目对应：测试方法、测试充分性要求、通过准则三个字段的条目数量必须完全一致
    4. 禁止编造未提供的参数、地址或测试方法

    【测试需求】
    核心任务：验证FPGA上电复位1s后从FLASH读取板卡ID、射频发射/接收本振配置参数的功能
    输入条件：FPGA上电复位完成，系统时钟CLK=100MHz稳定运行
    预期输出：正确读取板卡ID，正确配置射频发射/接收本振参数

    【FPGA配置参数表】
    | 参数名称 | 寄存器地址 | 说明 |
    |---------|-----------|------|
    | 板卡ID寄存器 | 0x0000 | 存储板卡唯一标识 |
    | 射频发射本振配置 | 0x0002 | 发射通道本振频率配置 |
    | 射频接收本振配置 | 0x0004 | 接收通道本振频率配置 |
    | 状态寄存器 | 0x000E | 操作状态标志位 |

    【时序参数】
    - 时钟频率：100MHz
    - 建立时间：≥12ns
    - 保持时间：≥8ns
    - 解码延迟：≤3个CLK周期

    【边界条件】
    - 地址边界：0x0000（最小地址）、0x000F（最大地址）
    - 时序边界：建立时间边界12ns、保持时间边界8ns
    - 指令边界：最大支持16条指令

    【测试环境】
    航天FPGA仿真测试环境，仿真工具ModelSim，时钟频率100MHz

    请根据以上信息生成完整的测试项，输出为JSON格式，包含test_items数组且每个item包含name/methods/requirements/criteria四个字段。

# 方案3：增强型上下文（LACWO）
scheme3:
  name: "方案3-增强型上下文"
  system: |
    你是一名资深航天FPGA测试工程师，具备10年以上航天嵌入式软件测试经验，精通GJB9433可编程逻辑测试要求，熟悉星载FPGA测控指令解码与执行逻辑测试。

    【输出格式约束】
    输出必须为标准JSON格式，结构如下：
    {
      "test_items": [
        {
          "name": "测试项名称",
          "methods": ["测试方法1", "测试方法2", ...],
          "requirements": ["测试充分性要求1", "测试充分性要求2", ...],
          "criteria": ["通过准则1", "通过准则2", ...]
        }
      ]
    }

    【内容约束】
    1. 条目一一对应：methods、requirements、criteria三个数组的长度必须完全相等
    2. 无幻觉原则：仅使用输入中提供的参数、地址、时序数据，禁止编造任何未提供的信息
    3. 规范性：测试方法需符合航天测试规范，表述准确、无歧义
    4. 完整性：覆盖所有测试需求要点，无遗漏

    【禁止事项】
    - 禁止编造FPGA参数、寄存器地址、时序数值
    - 禁止使用输入中未提及的测试方法
    - 禁止输出非JSON格式的额外说明文字

    【Few-Shot示例】
    输入示例：
    测试需求：验证FPGA配置寄存器读写功能
    参数：配置寄存器地址0x0010，写入值0x55AA

    输出示例：
    {
      "test_items": [
        {
          "name": "配置寄存器写入测试",
          "methods": [
            "向地址0x0010写入数据0x55AA",
            "读取地址0x0010的数据",
            "比对写入值与读取值"
          ],
          "requirements": [
            "写入操作需在时钟上升沿完成",
            "读取操作需等待1个CLK周期",
            "数据比对需完全一致"
          ],
          "criteria": [
            "写入操作成功，无异常标志",
            "读取数据为0x55AA",
            "写入值与读取值完全一致"
          ]
        }
      ]
    }
  user: |
    【测试需求】
    验证FPGA上电复位1s后从FLASH读取板卡ID、射频发射/接收本振配置参数的功能。

    【FPGA配置参数表】
    | 参数名称 | 寄存器地址 | 说明 |
    |---------|-----------|------|
    | 板卡ID寄存器 | 0x0000 | 存储板卡唯一标识 |
    | 射频发射本振配置 | 0x0002 | 发射通道本振频率配置 |
    | 射频接收本振配置 | 0x0004 | 接收通道本振频率配置 |
    | 状态寄存器 | 0x000E | 操作状态标志位 |

    【时序参数】
    - 时钟频率：100MHz
    - 建立时间：≥12ns
    - 保持时间：≥8ns
    - 解码延迟：≤3个CLK周期

    【边界条件】
    - 地址边界：0x0000~0x000F
    - 时序边界：建立时间12ns、保持时间8ns
    - 指令边界：最大16条指令

    【测试环境】
    航天FPGA仿真测试环境，仿真工具ModelSim，时钟频率100MHz

    请生成测试项。

# 评价维度
evaluation_prompt: |
  请作为航天FPGA测试项生成实验的评价专家，严格按照以下评分标准对输入的测试项生成结果打分。
  
  【原始输入Prompt】
  {input_prompt}
  
  【模型输出结果】
  {output_content}
  
  【Python格式合规性检查结果】
  1. JSON有效性：{json_valid}（{json_valid_detail}）
  2. 结构完整性：{structure_valid}（{structure_detail}）
  3. 字段命名规范：{field_names_valid}（{field_names_detail}）
  4. 数据类型正确：{data_types_valid}（{data_types_detail}）
  
  【评分标准】
  
  一、格式合规率（100分）
  参考Python检查结果进行评分：
  1. JSON有效性（40分）：JSON解析成功
  2. 结构完整性（30分）：包含test_items数组且每个item包含name/methods/requirements/criteria
  3. 字段命名规范（15分）：字段名称完全符合要求
  4. 数据类型正确（15分）：name为字符串，methods/requirements/criteria为数组
  
  二、条目对应率（100分）
  1. 数量一致（50分）：methods/requirements/criteria数组长度完全相等
  2. 逻辑对应（30分）：每个位置的条目在逻辑上相互对应
  3. 表述规范（20分）：条目表述清晰、无歧义、符合航天规范
  
  三、需求覆盖率（100分）
  1. 功能覆盖（40分）：覆盖所有测试功能点
  2. 边界覆盖（30分）：覆盖地址边界、时序边界、指令边界
  3. 异常场景（30分）：包含异常处理、错误检测等测试场景
  
  四、测试项有效性（100分）
  1. 技术可行性（25分）：操作步骤明确、技术手段可行
  2. 流程完整性（25分）：包含前置条件、执行步骤、结果验证、后置处理
  3. 数据合理性（20分）：正常值、边界值、异常值设计合理
  4. 准则可验证性（15分）：通过准则可量化、可判定
  5. 实际意义（15分）：能发现潜在缺陷、无冗余测试
  
  五、输出描述质量（100分）
  1. 清晰度（25分）：测试目标明确、步骤清晰、无歧义表述
     - 优秀（22-25分）：每个测试项有明确的测试目标描述，测试方法步骤清晰，无歧义表述
     - 良好（17-21分）：测试目标基本清晰，步骤可理解，少量表述需推敲
     - 一般（12-16分）：测试目标模糊，步骤描述不够清晰，需要补充说明
     - 较差（6-11分）：测试目标不明确，步骤描述混乱
     - 不清晰（0-5分）：无法理解测试意图
  
  2. 完整性（25分）：包含测试项描述、详细测试方法、充分性说明、通过准则
     - 优秀（22-25分）：包含测试项描述、详细测试方法、充分性说明、明确的通过准则
     - 良好（17-21分）：包含主要要素，部分细节可补充
     - 一般（12-16分）：缺少部分要素（如测试项描述、充分性说明）
     - 较差（6-11分）：要素严重缺失
     - 不完整（0-5分）：仅有基本框架
  
  3. 充分性（25分）：具体参数值、详细操作步骤、场景覆盖全面
     - 优秀（22-25分）：测试方法包含具体参数值、操作步骤、预期结果；充分性说明覆盖多种场景
     - 良好（17-21分）：测试方法有具体参数，场景覆盖较全面
     - 一般（12-16分）：测试方法有基本参数，场景覆盖一般
     - 较差（6-11分）：测试方法缺乏具体参数，场景覆盖不足
     - 不充分（0-5分）：描述过于笼统
  
  4. 用户阅读感（25分）：结构清晰、术语准确、可直接使用
     - 优秀（22-25分）：结构清晰、层次分明、专业术语准确、便于测试人员直接使用
     - 良好（17-21分）：结构较清晰、术语基本准确、可读性较好
     - 一般（12-16分）：结构一般、部分术语不准确、需要一定理解成本
     - 较差（6-11分）：结构混乱、术语错误、阅读困难
     - 难以阅读（0-5分）：无法理解或使用
  
  六、无幻觉率（100分）
  1. 参数准确（40分）：所有寄存器地址与输入一致
  2. 方法可行（30分）：测试方法在技术上是可行的
  3. 无额外编造（30分）：未编造输入中未提及的参数、地址、时序

  输出要求：
  仅输出JSON，格式为：
  {{
    "格式合规率": 分数,
    "格式合规率说明": "参考Python检查结果进行评分，扣分原因",
    "条目对应率": 分数,
    "条目对应率说明": "扣分原因",
    "需求覆盖率": 分数,
    "需求覆盖率说明": "扣分原因",
    "测试项有效性": 分数,
    "测试项有效性说明": "扣分原因",
    "输出描述质量": 分数,
    "输出描述质量说明": "清晰度：XX分（原因）；完整性：XX分（原因）；充分性：XX分（原因）；用户阅读感：XX分（原因）",
    "无幻觉率": 分数,
    "无幻觉率说明": "扣分原因"
  }}
